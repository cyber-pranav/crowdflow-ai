services:
  - type: web
    name: crowdflow-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: crowdflow-backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SIMULATION_USER_COUNT
        value: 500
      - key: SIMULATION_TICK_INTERVAL_MS
        value: 2000
      - key: GEMINI_API_KEY
        sync: false
